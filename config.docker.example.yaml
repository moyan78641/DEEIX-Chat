app:
  name: DEEIX Chat
  # REQUIRED for deployment: change to prod and replace security/admin defaults below.
  env: dev

server:
  # Docker defaults. Keep these values unless you are changing the exposed port or public domain.
  # If http_port changes, also update the compose port mapping "<host_port>:<container_port>".
  # If a reverse proxy or domain is used, update public_api_base_url and public_web_base_url.
  http_port: "8080"
  cors_allow_origin: "http://localhost:8080,http://127.0.0.1:8080"
  trusted_proxies: "127.0.0.1/32,::1/128"
  public_api_base_url: "http://localhost:8080"
  public_web_base_url: "http://localhost:8080"
  frontend_dist_dir: "/app/frontend/out"
  read_header_timeout_seconds: 10
  read_timeout_seconds: 120
  idle_timeout_seconds: 120
  max_header_bytes: 1048576

security:
  # REQUIRED for deployment: replace both values with strong random secrets.
  # data_encryption_key protects upstream API keys, SSO secrets, MCP tokens, and TOTP secrets.
  jwt_secret: "change-me-dev-jwt-secret"
  data_encryption_key: "change-me-dev-data-encryption-key-32-bytes-min"
  # Optional: set true to block outbound requests to localhost, private networks, link-local, and metadata IPs in prod.
  ssrf_protection_enabled: false

database:
  postgres:
    # docker-compose.full.yml overrides this to postgres:5432.
    # REQUIRED for docker-compose.yml: set this to your external PostgreSQL address.
    dsn: "postgres://deeix_chat:deeix_chat_dev_2026@your-postgres-host:5432/deeix_chat?sslmode=disable&TimeZone=Asia%2FShanghai"
    max_open_conns: 30
    max_idle_conns: 10
    conn_max_lifetime_minutes: 60
    conn_max_idle_time_minutes: 10
  redis:
    # docker-compose.full.yml overrides this to redis:6379.
    # REQUIRED for docker-compose.yml: set these to your external Redis connection settings.
    addr: "your-redis-host:6379"
    password: "deeix_chat_redis_dev"
    db: 0

storage:
  # Optional: switch to s3 and fill the s3 block when using object storage.
  backend: local
  local:
    root_dir: /app/storage
  s3:
    endpoint: ""
    region: auto
    bucket: ""
    prefix: ""
    access_key_id: ""
    secret_access_key: ""
    force_path_style: true

geoip:
  # Optional: use none to disable, ipwhois for the built-in public lookup,
  # or mmdb for a local GeoLite2/MMDB database.
  provider: ipwhois
  # GeoLite2/MMDB example. Leave these commented unless provider is set to mmdb.
  # database_url: "https://example.com/path/to/GeoLite2-City.mmdb"
  # database_path: "/app/data/geoip/GeoLite2-City.mmdb"
  # database_max_bytes: 104857600
  # refresh_interval_hours: 168
  # timeout_ms: 2500

observability:
  tracing:
    # Optional: configure OpenTelemetry collector endpoint to enable tracing.
    # Omit enabled to auto-enable tracing when endpoint is set.
    # If enabled is true, endpoint is required; if enabled is false, tracing stays disabled.
    # enabled: true
    endpoint: ""
    headers: ""
    insecure: false
    sampling_rate: 1
