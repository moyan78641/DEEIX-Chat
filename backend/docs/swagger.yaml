info:
  contact: {}
  description: DEEIX Chat 后端 API 文档
  title: DEEIX Chat API
  version: 0.1.2
paths:
  /admin/audit-logs:
    get:
      consumes:
      - application/json
      description: 管理员分页查看全量可追溯审计日志
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: 搜索关键词
        in: query
        name: query
        type: string
      - description: 资源类型
        in: query
        name: resource
        type: string
      - description: 动作
        in: query
        name: action
        type: string
      - description: 操作人用户ID
        in: query
        name: actor_user_id
        type: integer
      - description: 创建时间起点(RFC3339)
        in: query
        name: created_from
        type: string
      - description: 创建时间终点(RFC3339)
        in: query
        name: created_to
        type: string
      - description: 排序方式
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_transport_http_admin.AuditLogListResponseDoc'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_transport_http_admin.ErrorDoc'
      security:
      - BearerAuth: []
      summary: 管理员查询审计日志
      tags:
      - admin
  /admin/billing/accounts/{user_id}/balance:
    patch:
      consumes:
      - application/json
