        name: page
        type: integer
      - description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: 搜索模型、上游、绑定编码、协议
        in: query
        name: query
        type: string
      - description: 平台模型名筛选
        in: query
        name: platform_model_name
        type: string
      - description: 计费模式筛选：free/token/call/duration/tiered
        in: query
        name: billing_mode
        type: string
      - description: 调用人用户ID
        in: query
        name: user_id
        type: integer
      - description: 创建时间起点(RFC3339)
        in: query
        name: created_from
        type: string
      - description: 创建时间终点(RFC3339)
        in: query
        name: created_to
        type: string
      - description: 排序方式
        in: query
        name: sort
        type: string
