        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_transport_http_admin.ErrorDoc'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_transport_http_admin.ErrorDoc'
      security:
      - BearerAuth: []
      summary: 管理员查询模型调用日志
      tags:
      - admin
  /admin/llm/models:
    get:
      consumes:
      - application/json
      description: 管理员分页查询平台模型目录，可按 only_active 过滤
      parameters:
      - description: 页码
        in: query
