        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_transport_http_billing.ErrorDoc'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_transport_http_billing.ErrorDoc'
      security:
      - BearerAuth: []
      summary: 管理员保存模型按量单价
      tags:
      - admin-billing
